<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To - Do List</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="to-do-container">
        <div><br><br>
            <h1 class="text-center">My Task</h1>
            <br>
            <div class="container-fluid">
                <div class="row task-container">
                    <div class="col-lg-3 col-sm-12">
                        <input type="text" class="form-control" id="user_task" placeholder="Type Your Task Here..">
                    </div>
                    <div class="col-lg-1 col-sm-12 w-fluid">
                        <button type="button" onclick="btn()" class="btn btn-dark " data-bs-container="body"
                            data-bs-toggle="popover" data-bs-placement="top" data-bs-content="Top popover">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus">
                                <path d="M5 12h14" />
                                <path d="M12 5v14" />
                            </svg>Add
                        </button>
                    </div>
                </div>
                <div id="TaskData">
                    <div>Your Tasks : <span  id="yt">0</span></div>
                    <div>Completed Tasks : <span  id="ct">0</span></div>
                </div>
                <br>
                <div class="row justify-content-center">
                    <div class="col-4 user-task d-flex align-items-center justify-content-between">
                        <div class="card shadow">
                            <span id="Task_Card"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>

</html>
